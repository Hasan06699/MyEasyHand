paths:
  /plans/public:
    get:
      summary: 'List public subscription plans'
      tags: [Plans]
      security: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized

  /plans/public/{id}:
    get:
      summary: 'Get public plan by ID'
      tags: [Plans]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized

  /plans:
    get:
      summary: 'List all plans (admin)'
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: 'Create plan'
      tags: [Plans]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /plans/{id}:
    get:
      summary: 'Get plan by ID'
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    put:
      summary: 'Update plan'
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      summary: 'Delete plan'
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
