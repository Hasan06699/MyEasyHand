paths:
  /service-owners/documents/list:
    get:
      summary: 'List owner documents'
      tags: [Service Owners]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /service-owners/documents:
    post:
      summary: 'Upload owner document'
      tags: [Service Owners]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /service-owners/documents/{id}/approve:
    put:
      summary: 'Approve document'
      tags: [Service Owners]
      security:
